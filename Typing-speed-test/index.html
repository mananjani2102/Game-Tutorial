<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Test</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://tse4.mm.bing.net/th/id/OIP.XckmzQyh3xw35dZO566B9wHaHa?pid=Api&P=0&h=180"
        type="image/x-icon">


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-box h3 {
            font-size: 0.9em;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .stat-box div {
            font-size: 2em;
            font-weight: bold;
        }

        .text-display {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            font-size: 1.3em;
            line-height: 1.8;
            margin-bottom: 20px;
            min-height: 150px;
        }

        .text-display .correct {
            color: green;
        }

        .text-display .incorrect {
            color: red;
            background: #ffcccc;
        }

        .text-display .current {
            background: #667eea;
            color: white;
        }

        .timer {
            width: 2.5vw;
            height: 2vw;
            font-size: 18px;
            font-weight: lighter;
            border-radius: 10px;
            border: none;
            color: white;
            background: linear-gradient(135deg, #53ddbc 0%, #1179a9 100%);
        }

        #typingArea {
            width: 100%;
            padding: 20px;
            font-size: 1.2em;
            border: 2px solid #667eea;
            border-radius: 10px;
            resize: vertical;
            min-height: 150px;
            font-family: 'Courier New', monospace;
            margin-bottom: 15px;
        }

        #typingArea:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .start-btn,
        .reset-btn {
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .start-btn {
            background: #4ECDC4;
            color: white;
        }

        .start-btn:hover {
            background: #45b8b0;
            transform: translateY(-2px);
        }

        .start-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .reset-btn {
            background: #ff6b6b;
            color: white;
        }

        .reset-btn:hover {
            background: #ee5a5a;
        }

        @media (max-width: 768px) {
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⌨ Typing Speed Test</h1>

        <div class="stats-bar">
            <div class="stat-box">
                <h3>Time</h3>
                <!-- <div id="timer">60</div> -->
                <button class="timer">60</button>
                <button class="timer">30</button>
                <button class="timer">15</button>
            </div>
            <div class="stat-box">
                <h3>WPM</h3>
                <div id="wpm">0</div>
            </div>
            <div class="stat-box">
                <h3>Accuracy</h3>
                <div id="accuracy">100%</div>
            </div>
            <div class="stat-box">
                <h3>Best WPM</h3>
                <div id="bestWPM">0</div>
            </div>
        </div>

        <div class="text-display" id="textDisplay">
            Click "Start Test" to begin typing!
        </div>

        <textarea id="typingArea" placeholder="The test will start when you begin typing..." disabled></textarea>

        <button id="startBtn" class="start-btn">Start Test</button>
        <button id="resetBtn" class="reset-btn">Reset Session</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
