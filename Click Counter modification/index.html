<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Counter Game</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="container">
        <h1>Click Counter Game</h1>
        <p class="subtitle">Click as fast as you can!</p>

        <div class="score-section">
            <div class="score-box">
                <h2>Current Score</h2>
                <div id="currentScore" class="score">0</div>
            </div>
            <div class="score-box">
                <h2>High Score</h2>
                <div id="highScore" class="score">0</div>
            </div>
        </div>

        <div class="timer-section">
            <h2>Time Remaining</h2>
            <div id="timer" class="timer">10</div>
        </div>

        <div class="button-section">
            <button id="clickButton" class="click-btn" disabled>
                Click Me!
            </button>
            <button id="startButton" class="start-btn">
                Start Game
            </button>
            <div class="pr" style="display: flex; gap: 15px;">
                <button id="pauseButton" class="pause-btn"
                    style="display: flex; justify-content: center; align-items: center; width: 250px;">
                    Pause Game
                </button>
                <button id="resumeButton" class="resume-btn"
                    style="display: flex; justify-content: center; align-items: center; width: 250px;">
                    Resume Game
                </button>
            </div>
            <button id="resetHighScoreButton" class="reset-btn">
                Reset High Score
            </button>
        </div>

        <div id="statusMessage" class="status-message">
            Click "Start Game" to begin!
        </div>
    </div>

    <video id="celebrationVideo" src="./854341-hd_1280_720_25fps.mp4" autoplay muted loop style="display: none;"></video>


    <script src="index.js"></script>
</body>

</html>
